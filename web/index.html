<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EYE FIGHT — the staring contest with a computer-vision referee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14; --panel: #131826; --panel2: #1a2133; --border: #232c44;
    --text: #e6edf3; --dim: #7d8aa5;
    --accent: #ff4d6d; --good: #3ddc84; --warn: #ffb340; --bad: #ff5252; --blue: #4dabff;
    --rank1: #f5c518; --rank2: #c4cdd9; --rank3: #cd8c52;
    --font-body: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh; padding: 18px; max-width: 560px; margin: 0 auto;
  }
  /* animated background (adapted from the 21st.dev hero: grid + floating blobs) */
  .bg-fx { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .bg-fx::before {
    content: ''; position: absolute; inset: -2px;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 46px 46px; opacity: .16;
    -webkit-mask-image: radial-gradient(circle at 50% 28%, #000 30%, transparent 72%);
            mask-image: radial-gradient(circle at 50% 28%, #000 30%, transparent 72%);
    animation: gridpan 26s linear infinite;
  }
  @keyframes gridpan { to { background-position: 46px 46px; } }
  .blob { position: absolute; border-radius: 50%; filter: blur(72px); opacity: .28; }
  .blob.b1 { width: 340px; height: 340px; background: var(--accent); top: -100px; left: -90px; animation: float1 15s ease-in-out infinite; }
  .blob.b2 { width: 300px; height: 300px; background: var(--blue);   top: 140px;  right: -110px; animation: float2 19s ease-in-out infinite; }
  @keyframes float1 { 50% { transform: translate(46px, 36px) scale(1.12); } }
  @keyframes float2 { 50% { transform: translate(-34px, 44px) scale(1.06); } }

  /* hero */
  .hero { position: relative; text-align: center; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: clamp(34px, 10vw, 54px);
       letter-spacing: 2px; text-align: center; margin: 8px 0 2px;
       text-shadow: 0 2px 0 rgba(0,0,0,.35), 0 0 30px rgba(255,77,109,.28); animation: rise .55s ease both; }
  h1 .accent { color: var(--accent); }
  @keyframes hblink { 0%,88%,100% { transform: scaleY(1); } 93% { transform: scaleY(.08); } 96% { transform: scaleY(1); } }
  .tagline { text-align: center; color: var(--dim); font-size: 12px; margin-bottom: 12px; animation: rise .55s ease .05s both; }

  /* rotating "don't blink" seal */
  .seal { position: relative; width: 92px; height: 92px; margin: 4px auto 18px; }
  .seal svg { width: 100%; height: 100%; animation: spin 11s linear infinite; }
  .seal text { fill: var(--dim); font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase; }
  .seal-eye { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px;
              animation: hblink 4s ease-in-out infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } }
  @media (prefers-reduced-motion: reduce) {
    .blob, .bg-fx::before, .seal svg, h1 .eye, .seal-eye, .panel { animation: none !important; }
  }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px;
           animation: rise .5s ease both; }
  .label { font-size: 11px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* lobby */
  #live-banner { display: none; border-color: var(--accent); }
  #live-banner .who { color: var(--accent); font-weight: 700; }
  #live-banner img { width: 100%; border-radius: 8px; margin-top: 10px; }
  input[type=text] {
    width: 100%; padding: 14px; font: inherit; font-size: 16px; color: var(--text);
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; outline: none;
  }
  input[type=text]:focus { border-color: var(--blue); }
  button {
    width: 100%; padding: 16px; margin-top: 12px; font: inherit; font-size: 18px; font-weight: 700;
    letter-spacing: 2px; color: #fff; background: var(--accent); border: 0; border-radius: 10px; cursor: pointer;
  }
  button:disabled { opacity: .45; }
  button.ghost { background: var(--panel2); color: var(--dim); font-weight: 400; letter-spacing: 0; }
  /* leaderboard — modeled on trophy.so's LeaderboardCard (podium + rankings) */
  .lb-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  .lb-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .lb-range { font-size: 12px; color: var(--dim); margin-top: 3px; }

  /* podium (top 3, reordered 2-1-3) */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .podium:empty { display: none; }
  .podium-col { display: flex; flex-direction: column; align-items: center; flex: 1 1 0; max-width: 116px; min-width: 0; }
  .podium-ava {
    position: relative; width: 84px; height: 46px; border-radius: 12px; overflow: hidden;
    background: #0d1018; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .podium-col.p1 .podium-ava { width: 96px; height: 52px; border-color: var(--rank1); }
  .podium-col.p2 .podium-ava { border-color: var(--rank2); }
  .podium-col.p3 .podium-ava { border-color: var(--rank3); }
  .podium-ava img { width: 100%; height: 100%; object-fit: contain; padding: 3px; }
  .podium-ava .ph { color: var(--dim); font-size: 12px; letter-spacing: 1px; }
  .podium-crown {
    position: absolute; bottom: -3px; right: -3px; width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .podium-crown svg { width: 13px; height: 13px; }
  .podium-name {
    margin-top: 8px; font-size: 13px; font-weight: 600; text-align: center;
    max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .podium-val { font-size: 12px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .podium-block {
    margin-top: 8px; width: 100%; border-radius: 10px 10px 0 0;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 7px; font-weight: 800; font-size: 15px;
  }
  .podium-col.p1 .podium-block { height: 92px; background: linear-gradient(180deg, color-mix(in srgb, var(--rank1) 88%, #fff), var(--rank1)); color: #3a2a00; }
  .podium-col.p2 .podium-block { height: 68px; background: linear-gradient(180deg, color-mix(in srgb, var(--rank2) 88%, #fff), var(--rank2)); color: #1a2030; }
  .podium-col.p3 .podium-block { height: 54px; background: linear-gradient(180deg, color-mix(in srgb, var(--rank3) 88%, #fff), var(--rank3)); color: #2a1400; }

  /* rankings list (ranks 4+) */
  .lb { display: flex; flex-direction: column; }
  .lb-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 8px;
    border-bottom: 1px solid var(--border); border-radius: 8px;
    border: 2px solid transparent; border-bottom: 1px solid var(--border);
  }
  .lb-row.me { border: 2px solid var(--accent); background: rgba(255,77,109,.10); border-radius: 10px; }
  .lb-rank {
    flex: 0 0 26px; text-align: right; font-size: 14px; font-weight: 700;
    color: var(--dim); font-variant-numeric: tabular-nums;
  }
  .lb-eyes {
    flex: 0 0 auto; width: 56px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: #0d1018; border: 1px solid var(--border); overflow: hidden;
  }
  .lb-eyes img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
  .lb-eyes.empty { color: var(--dim); font-size: 11px; letter-spacing: 1px; border-style: dashed; }
  .lb-main { flex: 1 1 auto; min-width: 0; }
  .lb-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-byline { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .lb-score { flex: 0 0 auto; font-family: var(--font-display); font-weight: 700; font-size: 17px; font-variant-numeric: tabular-nums; }
  .lb-score small { font-size: 12px; color: var(--dim); font-weight: 400; }
  .consent { display: flex; align-items: center; gap: 9px; margin-top: 12px;
             font-size: 13px; color: var(--dim); cursor: pointer; user-select: none; }
  .consent input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .fallen-eyes { display: block; height: 56px; margin: 12px auto 0; }
  .empty { color: var(--dim); text-align: center; padding: 16px 0; font-size: 13px; }
  #err { color: var(--bad); font-size: 13px; margin-top: 10px; display: none; }

  /* game */
  .cam-wrap { position: relative; border-radius: 14px; overflow: hidden; background: #000; }
  video { display: block; width: 100%; transform: scaleX(-1); }
  .hud {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none;
  }
  #countdown-num { font-family: var(--font-display); font-size: 110px; font-weight: 700; text-shadow: 0 0 30px #000; }
  #stare-timer { font-family: var(--font-display); font-size: clamp(54px, 18vw, 90px); font-weight: 700; text-shadow: 0 0 30px #000; }
  .hud .msg { font-size: 15px; text-shadow: 0 2px 8px #000; margin-top: 6px; color: var(--text); }
  .chips { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; }
  .chip {
    background: rgba(11,14,20,.72); border: 1px solid #2c3654; border-radius: 8px;
    padding: 5px 10px; font-size: 13px; backdrop-filter: blur(4px);
  }
  .chip .hot { color: var(--accent); }
  #hint-bar { font-size: 12px; color: var(--warn); text-align: center; margin-top: 8px; min-height: 16px; }

  /* result */
  .result-score { font-family: var(--font-display); font-size: clamp(48px, 16vw, 80px); font-weight: 700; text-align: center; }
  .result-sub { text-align: center; color: var(--dim); margin: 6px 0 2px; }
  .result-rank { text-align: center; font-size: 20px; margin-top: 8px; }
  .result-rank b { color: var(--warn); }
  .percentile {
    display: block; margin: 14px auto 0; width: fit-content;
    padding: 8px 18px; border-radius: 999px; font-size: 15px; font-weight: 700;
    color: var(--good); background: rgba(61,220,132,.12); border: 1px solid var(--good);
  }
  .percentile.mid { color: var(--warn); background: rgba(255,179,64,.12); border-color: var(--warn); }
  .percentile.low { color: var(--dim); background: var(--panel2); border-color: var(--border); }
  .pulse-heart { color: var(--accent); }
  @keyframes beat { 0% {transform: scale(1);} 35% {transform: scale(1.3);} 100% {transform: scale(1);} }
  .beat { display: inline-block; animation: beat .25s ease-out; }
</style>
</head>
<body>
<div class="bg-fx"><div class="blob b1"></div><div class="blob b2"></div></div>

<div class="hero">
  <h1><span class="accent">EYE</span> FIGHT</h1>
  <p class="tagline">the staring contest with a computer-vision referee · don't blink</p>
  <div class="seal" aria-hidden="true">
    <svg viewBox="0 0 100 100">
      <defs><path id="seal-circ" d="M50,50 m-38,0 a38,38 0 1,1 76,0 a38,38 0 1,1 -76,0"/></defs>
      <text><textPath href="#seal-circ" startOffset="0">DON'T BLINK • DON'T BLINK • DON'T BLINK • </textPath></text>
    </svg>
    <span class="seal-eye">👁</span>
  </div>
</div>

<!-- ============ LOBBY ============ -->
<div id="screen-lobby" class="screen active">
  <div class="panel" id="live-banner">
    <div class="label">live now</div>
    <div><span class="who" id="live-name"></span> is staring… <b id="live-timer">0.0</b>s</div>
  </div>

  <div class="panel">
    <div class="label">enter the arena</div>
    <input type="text" id="name" placeholder="your name" maxlength="16" autocomplete="off">
    <label class="consent"><input type="checkbox" id="eyes-ok" checked>
      put my eyes on the board (a tiny crop of just your eyes becomes your profile)</label>
    <button id="play-btn">STARE 👁</button>
    <div id="err"></div>
  </div>

  <div class="panel">
    <div class="lb-head">
      <div><div class="lb-title">HALL OF DRY EYES</div><div class="lb-range" id="lb-range">all-time</div></div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="lb" id="board"></div>
    <div class="empty" id="board-empty">no champions yet — be the first</div>
  </div>
</div>

<!-- ============ GAME ============ -->
<div id="screen-game" class="screen">
  <div class="cam-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <div class="chips">
      <span class="chip" id="g-blink">👁 ready</span>
    </div>
    <div class="hud">
      <div id="countdown-num"></div>
      <div id="stare-timer" style="display:none">0.0</div>
      <div class="msg" id="g-msg">blink now while you still can</div>
    </div>
  </div>
  <div id="hint-bar"></div>
  <button class="ghost" id="forfeit-btn">forfeit</button>
</div>

<!-- ============ RESULT ============ -->
<div id="screen-result" class="screen">
  <div class="panel">
    <div class="label" id="r-label">you blinked</div>
    <div class="result-score" id="r-score">0.0s</div>
    <div class="result-rank" id="r-rank"></div>
    <div class="percentile" id="r-pct" style="display:none"></div>
    <img class="fallen-eyes" id="r-eyes" alt="your eyes at the fatal blink" style="display:none">
    <div class="result-sub" id="r-best" style="display:none"></div>
  </div>
  <button id="again-btn">GO AGAIN 👁</button>
  <button class="ghost" id="share-btn">share my dry eyes 📤</button>
  <button class="ghost" id="home-btn">back to lobby</button>
  <div class="panel">
    <div class="lb-head">
      <div><div class="lb-title">HALL OF DRY EYES</div><div class="lb-range" id="lb-range2">all-time</div></div>
    </div>
    <div class="podium" id="podium2"></div>
    <div class="lb" id="board2"></div>
  </div>
</div>

<script>
// camera APIs require a secure origin — bounce http -> https up front
if (location.protocol === 'http:' && location.hostname !== 'localhost') {
  location.replace('https://' + location.host + location.pathname + location.search);
}
const $ = id => document.getElementById(id);
const FPS = 15, SEND_DIM = 480;   // fixed square frame for every player (see sendLoop)

let token = null, stream = null, sending = false, myName = '';

function show(screen) {
  for (const s of document.querySelectorAll('.screen')) s.classList.remove('active');
  $(screen).classList.add('active');
}

// ---------- lobby: live state + leaderboard over SSE ----------
const es = new EventSource('/events');
es.onmessage = e => {
  const m = JSON.parse(e.data);

  // spectator banner
  const busy = m.phase !== 'idle' && !token;
  $('live-banner').style.display = busy ? 'block' : 'none';
  if (busy) {
    $('live-name').textContent = m.player;
    $('live-timer').textContent = m.phase === 'staring' ? m.stare_t.toFixed(1)
                                : m.phase === 'done' ? m.score.toFixed(1) : '0.0';
  }

  renderLeaderboard($('podium'), $('board'), $('lb-range'), m.board);
  renderLeaderboard($('podium2'), $('board2'), $('lb-range2'), m.board);
  $('board-empty').style.display = m.board.length ? 'none' : 'block';

  // while we're the active player, the SSE stream (not frame acks) drives the
  // game/result screen — so the UI stays smooth no matter the upload latency
  if (token) onGameState(m);
};

const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isMe = name => myName && name.toLowerCase() === myName.toLowerCase();
const crown = colorVar =>
  `<span class="podium-crown"><svg viewBox="0 0 24 24" fill="none" stroke="var(${colorVar})" ` +
  `stroke-width="2.4" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7Z"/></svg></span>`;
const avatarHtml = e => e.avatar ? `<img src="/avatar?id=${e.avatar}" alt="">` : '<span class="ph">✕ ✕</span>';
// score -> tier byline (echoes the demo's "Level – Diamond" rank flavor)
const tier = s => s >= 30 ? '💎 Diamond Gaze' : s >= 20 ? 'Platinum Stare'
                : s >= 12 ? 'Gold Eyes' : s >= 6 ? 'Silver Lids' : 'Bronze Blinker';

function fmtRange(board) {
  const dates = board.map(e => e.when).filter(Boolean).sort();
  if (!dates.length) return 'all-time';
  const fmt = d => { const t = new Date(d + 'T00:00'); return isNaN(t) ? d
    : t.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); };
  return dates[0] === dates[dates.length - 1] ? fmt(dates[0]) : `${fmt(dates[0])} – ${fmt(dates[dates.length - 1])}`;
}

function renderLeaderboard(podiumEl, listEl, rangeEl, board) {
  if (rangeEl) rangeEl.textContent = fmtRange(board);

  // podium: top 3, displayed 2nd · 1st · 3rd
  const rankVar = { 1: '--rank1', 2: '--rank2', 3: '--rank3' };
  const order = [board[1], board[0], board[2]];  // 2,1,3 (undefined entries skipped)
  podiumEl.innerHTML = order.map((e) => {
    if (!e) return '';
    const rank = board.indexOf(e) + 1;
    return `<div class="podium-col p${rank}${isMe(e.name) ? ' me' : ''}">` +
      `<div class="podium-ava">${avatarHtml(e)}${crown(rankVar[rank])}</div>` +
      `<div class="podium-name">${esc(e.name)}</div>` +
      `<div class="podium-val">${e.score.toFixed(2)}s</div>` +
      `<div class="podium-block">${rank}</div>` +
    `</div>`;
  }).join('');

  // rankings list: full standings (matches the demo, which lists every rank)
  listEl.innerHTML = board.map((e, i) => {
    const rank = i + 1;
    const byline = (isMe(e.name) ? 'you · ' : '') + tier(e.score);
    return `<div class="lb-row${isMe(e.name) ? ' me' : ''}">` +
      `<div class="lb-rank">${rank}</div>` +
      `<div class="lb-eyes${e.avatar ? '' : ' empty'}">${avatarHtml(e)}</div>` +
      `<div class="lb-main"><div class="lb-name">${esc(e.name)}</div>` +
        `<div class="lb-byline">${byline}</div></div>` +
      `<div class="lb-score">${e.score.toFixed(2)}<small>s</small></div>` +
    `</div>`;
  }).join('');
}

// ---------- joining ----------
$('play-btn').onclick = play;
$('again-btn').onclick = play;
$('home-btn').onclick = () => show('screen-lobby');
$('forfeit-btn').onclick = async () => { await leave(); show('screen-lobby'); };
$('name').onkeydown = e => { if (e.key === 'Enter') play(); };

async function play() {
  myName = $('name').value.trim() || myName || 'anonymous';
  $('err').style.display = 'none';
  // Some in-app browsers (KakaoTalk, Instagram, etc.) and insecure origins
  // don't expose the camera API at all — fail with a clear message, not a crash.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    $('err').innerHTML = location.protocol !== 'https:'
      ? 'open this page over <b>https://eyefight.xyz</b> to use the camera'
      : "this in-app browser blocks the camera — tap ••• and <b>Open in Safari/Chrome</b>";
    $('err').style.display = 'block';
    return;
  }
  try {
    if (!stream) {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 960 } }, audio: false
      });
    }
    $('cam').srcObject = stream;
    const r = await fetch('/api/join', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: myName, eyes: $('eyes-ok').checked })
    });
    if (r.status === 409) {
      const b = await r.json();
      throw new Error(`${b.player} is mid-stare — wait for them to blink`);
    }
    if (!r.ok) throw new Error('could not join');
    token = (await r.json()).token;
    show('screen-game');
    $('g-msg').textContent = 'blink now while you still can';
    $('countdown-num').textContent = '';
    $('stare-timer').style.display = 'none';
    sendLoop();
  } catch (e) {
    $('err').textContent = e.name === 'NotAllowedError'
      ? 'camera permission denied — EYE FIGHT needs your eyes'
      : (e.message || 'something broke');
    $('err').style.display = 'block';
  }
}

async function leave() {
  if (token) { const t = token; token = null; await fetch('/api/leave?token=' + t, { method: 'POST' }).catch(() => {}); }
  stopCam();
}
function stopCam() {
  if (stream) { for (const t of stream.getTracks()) t.stop(); stream = null; }
}
addEventListener('pagehide', () => {
  if (token) navigator.sendBeacon('/api/leave?token=' + token);
});

// ---------- share ----------
$('share-btn').onclick = async () => {
  if (!lastResult) return;
  const pct = lastResult.topPct ? ` — top ${lastResult.topPct}% of stare-fighters` : '';
  const text = `I held my eyes open for ${lastResult.score.toFixed(2)}s in EYE FIGHT 👁${pct}. ` +
               `Can you hold out longer than me? ${location.origin}`;
  try {
    const data = { text };
    if (lastResult.avatar && navigator.canShare) {
      const blob = await fetch('/avatar?id=' + lastResult.avatar).then(r => r.blob());
      const file = new File([blob], 'my-dry-eyes.png', { type: blob.type });
      if (navigator.canShare({ files: [file] })) { data.files = [file]; data.title = 'EYE FIGHT'; }
    }
    if (navigator.share) { await navigator.share(data); return; }
  } catch (e) {
    if (e.name === 'AbortError') return;  // user closed the share sheet
  }
  // no Web Share API (desktop browsers): open an X post instead
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
};

// ---------- frame pump: camera -> server -> SmartSpectra ----------
// Fire frames at a steady rate WITHOUT waiting for each response. Over the
// tunnel a round-trip can take 100-300ms; awaiting it would crush the frame
// rate and starve blink/face detection. We cap in-flight requests so a slow
// link just drops frames instead of piling up, and the server reorders by
// timestamp. Game state arrives separately via SSE.
async function sendLoop() {
  if (sending) return;
  sending = true;
  const video = $('cam'), canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let inFlight = 0;
  // Every frame from every player must be EXACTLY this size. The SDK's
  // optical-flow tracker runs continuously across the whole stream (it never
  // resets between players), so any size change — even from a different phone
  // next round — crashes it. A fixed square also matches the SDK's ROI.
  canvas.width = SEND_DIM;
  canvas.height = SEND_DIM;

  const tick = setInterval(async () => {
    if (!token) { clearInterval(tick); sending = false; return; }
    if (inFlight >= 4 || video.videoWidth === 0) return;   // don't outrun the link
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.max(canvas.width / vw, canvas.height / vh);  // cover
    const dw = vw * scale, dh = vh * scale;
    ctx.drawImage(video, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.65));
    if (!token) return;
    inFlight++;
    fetch('/api/frame?token=' + token, {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream', 'X-TS': String(Math.round(performance.now() * 1000)) },
      body: blob
    }).then(r => { if (r.status === 410) token = null; })
      .catch(() => { /* transient network blip — keep pumping */ })
      .finally(() => { inFlight--; });
  }, 1000 / FPS);
}

let lastBlinkAgo = -1, lastResult = null;
function onGameState(m) {
  $('hint-bar').textContent = m.hint || '';

  if (m.blink_ago >= 0 && m.blink_ago < 0.5 && lastBlinkAgo !== m.blink_ago) {
    $('g-blink').textContent = '👁 blink!';
    $('g-blink').classList.add('hot');
    setTimeout(() => { $('g-blink').textContent = '👁👁 watching'; $('g-blink').classList.remove('hot'); }, 600);
  }
  lastBlinkAgo = m.blink_ago;

  if (m.phase === 'countdown') {
    if (m.countdown <= 0 && !m.face) {
      $('countdown-num').textContent = '👀';
      $('g-msg').textContent = 'show your eyes to begin';
    } else {
      $('countdown-num').textContent = Math.ceil(m.countdown);
      $('g-msg').textContent = 'blink now while you still can';
    }
  } else if (m.phase === 'staring') {
    $('countdown-num').textContent = '';
    $('stare-timer').style.display = 'block';
    $('stare-timer').textContent = m.stare_t.toFixed(1);
    $('g-msg').textContent = "DON'T BLINK";
  } else if (m.phase === 'done') {
    token = null;
    stopCam();
    lastResult = m;
    const dq = m.reason === 'lost';
    $('r-label').textContent = dq ? 'disqualified' : 'you blinked';
    $('r-score').textContent = m.score.toFixed(2) + 's';
    $('r-rank').innerHTML = dq ? '🚫 your eyes left the arena — no score recorded'
                          : m.rank === 1 ? '👑 <b>NEW CHAMPION</b>'
                          : m.rank > 0 ? `rank <b>#${m.rank}</b> in the hall of dry eyes` : '';
    $('r-eyes').style.display = m.avatar ? 'block' : 'none';
    if (m.avatar) $('r-eyes').src = '/avatar?id=' + m.avatar;
    const isPB = m.best > 0 && m.score >= m.best - 0.005;
    $('r-best').style.display = !dq && m.best > 0 ? 'block' : 'none';
    $('r-best').textContent = isPB ? 'new personal best!'
                                   : `personal best: ${m.best.toFixed(2)}s — profile keeps it`;

    // top X% of the scoreboard
    const pct = $('r-pct');
    if (!dq && m.rank > 0 && m.players > 1) {
      const topPct = Math.max(1, Math.round((m.rank / m.players) * 100));
      pct.textContent = m.rank === 1 ? `🏆 #1 of ${m.players} — top of the board`
                                     : `🔥 top ${topPct}% of ${m.players} stare-fighters`;
      pct.className = 'percentile' + (topPct <= 10 ? '' : topPct <= 50 ? ' mid' : ' low');
      pct.style.display = 'block';
    } else {
      pct.style.display = 'none';
    }
    lastResult.topPct = (!dq && m.rank > 0 && m.players > 1)
      ? Math.max(1, Math.round((m.rank / m.players) * 100)) : 0;

    $('share-btn').style.display = dq ? 'none' : 'block';
    show('screen-result');
  } else if (m.phase === 'idle') {
    token = null;
    stopCam();
    show('screen-lobby');
  }
}
</script>
